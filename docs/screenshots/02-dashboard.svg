  <text x="369" y="170" font-size="13" font-weight="600" fill="#A16207">In Progress</text>
  <rect x="597" y="154" width="30" height="20" rx="10" fill="rgba(255,255,255,0.7)"/>
  <text x="612" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#A16207">2</text>

  <!-- Card 4: Build auth system (overdue) -->
  <rect x="353" y="196" width="293" height="126" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow-hover)"/>
  <text x="369" y="216" font-size="13" font-weight="600" fill="#1F2937">Build authentication system</text>
  <text x="369" y="232" font-size="11" fill="#6B7280">Google OAuth + Passport.js + JWT</text>
  <text x="369" y="246" font-size="11" fill="#6B7280">token management.</text>
  <text x="369" y="262" font-size="11" font-weight="500" fill="#EF4444">Overdue · Mar 8, 2026</text>
  <rect x="369" y="272" width="72" height="20" rx="6" fill="#FEF9C3"/>
  <text x="405" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#A16207">In Progress</text>
  <rect x="542" y="272" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="563" y="285" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="591" y="272" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="614" y="285" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

  <!-- Card 5: Design landing page -->
  <rect x="353" y="334" width="293" height="126" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="369" y="354" font-size="13" font-weight="600" fill="#1F2937">Design landing page</text>
  <text x="369" y="370" font-size="11" fill="#6B7280">Create wireframes and implement the</text>
  <text x="369" y="384" font-size="11" fill="#6B7280">marketing page with Tailwind CSS.</text>
  <text x="369" y="400" font-size="11" fill="#9CA3AF">Due · Mar 20, 2026</text>
  <rect x="369" y="410" width="72" height="20" rx="6" fill="#FEF9C3"/>
  <text x="405" y="423" text-anchor="middle" font-size="10" font-weight="600" fill="#A16207">In Progress</text>
  <rect x="542" y="410" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="563" y="423" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="591" y="410" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="614" y="423" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

  <!-- ════════════════════════════════════
       COLUMN 3 — DONE  (x=666, w=293)
       ════════════════════════════════════ -->
  <rect x="666" y="148" width="293" height="36" rx="8" fill="#DCFCE7"/>
  <text x="682" y="170" font-size="13" font-weight="600" fill="#15803D">Done</text>
  <rect x="910" y="154" width="30" height="20" rx="10" fill="rgba(255,255,255,0.7)"/>
  <text x="925" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#15803D">3</text>

  <!-- Card 6: Create database schema -->
  <rect x="666" y="196" width="293" height="106" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="682" y="216" font-size="13" font-weight="600" fill="#1F2937">Create database schema</text>
  <text x="682" y="232" font-size="11" fill="#6B7280">Define PostgreSQL tables for users</text>
  <text x="682" y="246" font-size="11" fill="#6B7280">and tasks with constraints.</text>
  <rect x="682" y="258" width="40" height="20" rx="6" fill="#DCFCE7"/>
  <text x="702" y="271" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">Done</text>
  <rect x="855" y="258" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="876" y="271" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="904" y="258" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="927" y="271" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

  <!-- Card 7: Set up Express server -->
  <rect x="666" y="314" width="293" height="106" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="682" y="334" font-size="13" font-weight="600" fill="#1F2937">Set up Express server</text>
  <text x="682" y="350" font-size="11" fill="#6B7280">Bootstrap Node.js backend with</text>
  <text x="682" y="364" font-size="11" fill="#6B7280">CORS, middleware and error handler.</text>
  <rect x="682" y="376" width="40" height="20" rx="6" fill="#DCFCE7"/>
  <text x="702" y="389" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">Done</text>
  <rect x="855" y="376" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="876" y="389" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="904" y="376" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="927" y="389" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

  <!-- Card 8: Initialize React project -->
  <rect x="666" y="432" width="293" height="106" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="682" y="452" font-size="13" font-weight="600" fill="#1F2937">Initialize React project</text>
  <text x="682" y="468" font-size="11" fill="#6B7280">Set up Vite + React 18 + Tailwind CSS</text>
  <text x="682" y="482" font-size="11" fill="#6B7280">with Vite proxy for API calls.</text>
  <rect x="682" y="494" width="40" height="20" rx="6" fill="#DCFCE7"/>
  <text x="702" y="507" text-anchor="middle" font-size="10" font-weight="600" fill="#15803D">Done</text>
  <rect x="855" y="494" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="876" y="507" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="904" y="494" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="927" y="507" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>
</svg>
