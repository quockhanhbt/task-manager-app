<svg width="1000" height="620" viewBox="0 0 1000 620" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0000000E"/>
    </filter>
    <filter id="card-shadow-hover">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#00000014"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1000" height="620" fill="#F9FAFB"/>

  <!-- ── Header ── -->
  <rect width="1000" height="56" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="40" y="35" font-size="18" font-weight="700" fill="#111827" letter-spacing="-0.3">Task Manager</text>

  <!-- + New Task button -->
  <rect x="758" y="14" width="118" height="34" rx="8" fill="#4F46E5"/>
  <text x="817" y="35" text-anchor="middle" font-size="13" font-weight="500" fill="white">+ New Task</text>

  <!-- Divider -->
  <line x1="893" y1="16" x2="893" y2="44" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Avatar circle -->
  <circle cx="912" cy="28" r="14" fill="#E0E7FF"/>
  <text x="912" y="33" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">A</text>

  <!-- Username + sign out -->
  <text x="932" y="24" font-size="13" fill="#374151">Alex Johnson</text>
  <text x="932" y="40" font-size="11" fill="#9CA3AF">Sign out</text>

  <!-- ── Sub-header: task count + filter ── -->
  <text x="40" y="92" font-size="13" fill="#9CA3AF">8 tasks</text>

  <!-- Filter tabs -->
  <!-- All (active) -->
  <rect x="40" y="104" width="46" height="28" rx="6" fill="white" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="63" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#4F46E5">All</text>
  <!-- To Do -->
  <rect x="94" y="104" width="60" height="28" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="124" y="122" text-anchor="middle" font-size="12" fill="#6B7280">To Do</text>
  <!-- In Progress -->
  <rect x="162" y="104" width="88" height="28" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="206" y="122" text-anchor="middle" font-size="12" fill="#6B7280">In Progress</text>
  <!-- Done -->
  <rect x="258" y="104" width="56" height="28" rx="6" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="286" y="122" text-anchor="middle" font-size="12" fill="#6B7280">Done</text>

  <!-- ════════════════════════════════════
       COLUMN 1 — TO DO  (x=40, w=293)
       ════════════════════════════════════ -->
  <rect x="40" y="148" width="293" height="36" rx="8" fill="#F3F4F6"/>
  <text x="56" y="170" font-size="13" font-weight="600" fill="#4B5563">To Do</text>
  <rect x="284" y="154" width="30" height="20" rx="10" fill="rgba(255,255,255,0.7)"/>
  <text x="299" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#4B5563">3</text>

  <!-- Card 1: Set up CI/CD pipeline -->
  <rect x="40" y="196" width="293" height="126" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="56" y="216" font-size="13" font-weight="600" fill="#1F2937">Set up CI/CD pipeline</text>
  <text x="56" y="232" font-size="11" fill="#6B7280">Configure GitHub Actions for automated</text>
  <text x="56" y="246" font-size="11" fill="#6B7280">testing and deployment workflows.</text>
  <text x="56" y="262" font-size="11" fill="#9CA3AF">Due · Mar 25, 2026</text>
  <!-- status badge -->
  <rect x="56" y="272" width="44" height="20" rx="6" fill="#F3F4F6"/>
  <text x="78" y="285" text-anchor="middle" font-size="10" font-weight="600" fill="#4B5563">To Do</text>
  <!-- Edit / Delete -->
  <rect x="229" y="272" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="250" y="285" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="278" y="272" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="301" y="285" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

  <!-- Card 2: Write unit tests (overdue) -->
  <rect x="40" y="334" width="293" height="126" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="56" y="354" font-size="13" font-weight="600" fill="#1F2937">Write unit tests</text>
  <text x="56" y="370" font-size="11" fill="#6B7280">Cover all controller functions with</text>
  <text x="56" y="384" font-size="11" fill="#6B7280">Jest and Supertest.</text>
  <text x="56" y="400" font-size="11" font-weight="500" fill="#EF4444">Overdue · Mar 5, 2026</text>
  <rect x="56" y="410" width="44" height="20" rx="6" fill="#F3F4F6"/>
  <text x="78" y="423" text-anchor="middle" font-size="10" font-weight="600" fill="#4B5563">To Do</text>
  <rect x="229" y="410" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="250" y="423" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="278" y="410" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="301" y="423" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

  <!-- Card 3: Update API docs (no date) -->
  <rect x="40" y="472" width="293" height="106" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" filter="url(#card-shadow)"/>
  <text x="56" y="492" font-size="13" font-weight="600" fill="#1F2937">Update API documentation</text>
  <text x="56" y="508" font-size="11" fill="#6B7280">Add OpenAPI/Swagger docs for all</text>
  <text x="56" y="522" font-size="11" fill="#6B7280">REST endpoints.</text>
  <rect x="56" y="534" width="44" height="20" rx="6" fill="#F3F4F6"/>
  <text x="78" y="547" text-anchor="middle" font-size="10" font-weight="600" fill="#4B5563">To Do</text>
  <rect x="229" y="534" width="42" height="20" rx="6" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <text x="250" y="547" text-anchor="middle" font-size="10" fill="#4F46E5">Edit</text>
  <rect x="278" y="534" width="46" height="20" rx="6" fill="white" stroke="#FECACA" stroke-width="1"/>
  <text x="301" y="547" text-anchor="middle" font-size="10" fill="#EF4444">Delete</text>

